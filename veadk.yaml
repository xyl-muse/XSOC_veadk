# VEADK全局配置文件
version: "1.0"

# 应用基础配置
app:
  name: xsoc-security-agent
  environment: development
  debug: true
  secret_key: ${SECRET_KEY:your-secret-key-change-in-production}

# Web服务配置
server:
  host: 0.0.0.0
  port: 8888
  cors:
    enabled: true
    origins:
      - "*"

# LLM配置
llm:
  default_model: ${LLM_MODEL:gpt-4o}
  temperature: 0.1
  max_tokens: 4096
  timeout: 120
  max_retries: 3
  openai:
    api_key: ${OPENAI_API_KEY:}
    base_url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

# 智能体配置
agents:
  # 事件研判专家
  investigation_agent:
    enabled: true
    llm_model: gpt-4o
    max_retry: 3
    tools: [
      "threat_intel_query",
      "xdr_event_query",
      "asset_query",
      "ndr_alert_query",
      "edr_alert_query"
    ]

  # 溯源分析专家
  tracing_agent:
    enabled: true
    llm_model: gpt-4o
    max_retry: 3
    tools: [
      "threat_intel_query",
      "xdr_event_query",
      "asset_query",
      "ndr_alert_query",
      "edr_alert_query",
      "xdr_evidence_query"
    ]

  # 风险处置专家
  response_agent:
    enabled: true
    llm_model: gpt-4o
    max_retry: 2
    tools: [
      "ndr_ip_block",
      "edr_isolate_host",
      "dingtalk_notify"
    ]

  # 数据可视化专家
  visualization_agent:
    enabled: true
    llm_model: gpt-3.5-turbo
    max_retry: 2
    tools: [
      "xdr_event_archive",
      "dingtalk_table_write"
    ]

# 工具全局配置
tools:
  # 微步威胁情报
  threat_intel:
    api_key: ${THREAT_BOOK_API_KEY:}
    base_url: https://api.threatbook.cn/v3

  # XDR API
  xdr:
    api_key: ${XDR_API_KEY:}
    base_url: ${XDR_API_BASE_URL:https://xdr.example.com/api}

  # 资产API
  asset:
    api_key: ${ASSET_API_KEY:}
    base_url: ${ASSET_API_BASE_URL:https://asset.example.com/api}

  # NDR API
  ndr:
    api_key: ${NDR_API_KEY:}
    base_url: ${NDR_API_BASE_URL:https://ndr.example.com/api}

  # EDR API
  edr:
    api_key: ${EDR_API_KEY:}
    base_url: ${EDR_API_BASE_URL:https://edr.example.com/api}

  # 钉钉API
  dingtalk:
    app_key: ${DINGTALK_APP_KEY:}
    app_secret: ${DINGTALK_APP_SECRET:}
    ai_table_id: ${DINGTALK_AI_TABLE_ID:}

# 日志配置
logging:
  level: INFO
  format: json
  file: ./logs/veadk.log
  rotation: 1 day
  retention: 7 days

# 监控配置
monitoring:
  enabled: true
  prometheus_port: 9090
  tracing:
    enabled: true
    jaeger_endpoint: ${JAEGER_ENDPOINT:}
